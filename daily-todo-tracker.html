<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6C63FF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Todo">
<meta name="description" content="Theo dõi công việc hàng ngày với streak tracking">
<title>Daily Todo Tracker</title>

<!-- PWA Manifest inline -->
<script>
const manifest = {
  name: "Daily Todo Tracker",
  short_name: "Daily Todo",
  description: "Theo dõi công việc hàng ngày với streak",
  start_url: "./",
  display: "standalone",
  background_color: "#ffffff",
  theme_color: "#6C63FF",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%236C63FF'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='110' fill='%236C63FF'/%3E%3Ctext x='256' y='340' font-size='270' text-anchor='middle'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const link = document.createElement('link');
link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
document.head.appendChild(link);
</script>

<style>
:root {
  --accent: #6C63FF;
  --accent-light: #EEF0FF;
  --fire: #FF6B35;
  --fire-light: #FFF0EB;
  --green: #2ECC71;
  --green-light: #E8FAF1;
  --red: #E74C3C;
  --bg: #ffffff;
  --bg2: #f5f5f7;
  --bg3: #ebebef;
  --text: #1a1a1a;
  --text2: #6b6b6b;
  --text3: #9b9b9b;
  --border: rgba(0,0,0,0.1);
  --border2: rgba(0,0,0,0.06);
  --radius: 12px;
  --radius-sm: 8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
    --text: #f2f2f7; --text2: #aeaeb2; --text3: #636366;
    --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.07);
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

/* ── Layout ── */
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.screen.active { display: flex; }

/* ── Status bar spacer ── */
.safe-top { height: calc(var(--safe-top) + 12px); flex-shrink: 0; }

/* ── Header ── */
.header { padding: 0 20px 12px; flex-shrink: 0; }
.header-row { display: flex; align-items: center; justify-content: space-between; }
.header-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.header-date { font-size: 13px; color: var(--text2); background: var(--bg2); padding: 4px 12px; border-radius: 20px; }

/* ── Scroll area ── */
.scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 0 16px; padding-bottom: calc(var(--safe-bottom) + 90px); }

/* ── Streak banner ── */
.streak-banner { background: var(--fire-light); border: 1px solid rgba(255,107,53,0.2); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
.streak-emoji { font-size: 32px; line-height: 1; }
.streak-info { flex: 1; }
.streak-label { font-size: 11px; color: #b85a2a; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.streak-count { font-size: 22px; font-weight: 700; color: #7a3a16; }
.streak-sub { font-size: 12px; color: #b85a2a; }
.streak-right { text-align: right; }
.streak-right .s-lbl { font-size: 11px; color: #b85a2a; font-weight: 500; }
.streak-right .s-val { font-size: 20px; font-weight: 700; color: #7a3a16; }

/* ── Progress bar ── */
.prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.prog-bar { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }
.prog-label { font-size: 13px; color: var(--text2); font-weight: 500; min-width: 36px; text-align: right; }

/* ── Section title ── */
.sec-title { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }

/* ── Task cards ── */
.task-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.task-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; cursor: pointer; transition: transform 0.1s, border-color 0.2s; user-select: none; }
.task-card:active { transform: scale(0.98); }
.task-card.done { border-color: rgba(46,204,113,0.35); background: var(--green-light); }
@media (prefers-color-scheme: dark) { .task-card.done { background: rgba(46,204,113,0.08); } }
.task-top { display: flex; align-items: center; gap: 10px; }
.task-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.task-card.done .task-check { background: var(--green); border-color: var(--green); }
.task-check-icon { font-size: 13px; color: white; opacity: 0; transition: opacity 0.2s; }
.task-card.done .task-check-icon { opacity: 1; }
.task-name { flex: 1; font-size: 15px; font-weight: 500; color: var(--text); }
.task-card.done .task-name { color: #27ae60; text-decoration: line-through; }
.streak-pill { font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 20px; background: var(--bg2); color: var(--text2); white-space: nowrap; }
.streak-pill.hot { background: var(--fire-light); color: #7a3a16; }
.streak-pill.done-pill { background: var(--green-light); color: #1a6b3a; }
.task-delete { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: var(--text3); font-size: 16px; transition: color 0.15s; }
.task-delete:active { color: var(--red); }
.task-bottom { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border2); }
.task-card.done .task-bottom { border-top-color: rgba(46,204,113,0.2); }
.dots { display: flex; gap: 4px; flex: 1; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: var(--bg3); }
.dot.filled { background: var(--green); }
.dot.fire { background: var(--fire); }
.dots-label { font-size: 11px; color: var(--text3); }

/* ── Add section ── */
.add-section { margin-bottom: 8px; }
.add-row { display: flex; gap: 8px; }
.add-input { flex: 1; height: 44px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 14px; font-size: 15px; color: var(--text); outline: none; -webkit-appearance: none; font-family: inherit; }
.add-input:focus { border-color: var(--accent); background: var(--bg); }
.add-btn { height: 44px; padding: 0 18px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
.add-btn:active { opacity: 0.8; }

/* ── Empty state ── */
.empty { text-align: center; padding: 40px 20px; color: var(--text2); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 15px; }

/* ── Toast ── */
#toast { position: fixed; top: calc(var(--safe-top) + 16px); left: 50%; transform: translateX(-50%) translateY(-120px); background: #1a1a1a; color: white; font-size: 14px; font-weight: 500; padding: 11px 20px; border-radius: 24px; white-space: nowrap; z-index: 999; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none; max-width: 90vw; text-align: center; }
@media (prefers-color-scheme: dark) { #toast { background: #f2f2f7; color: #1c1c1e; } }
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── Bottom nav ── */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); display: flex; padding-bottom: var(--safe-bottom); z-index: 100; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; gap: 3px; cursor: pointer; border: none; background: none; color: var(--text3); font-size: 10px; font-weight: 500; font-family: inherit; transition: color 0.15s; }
.nav-btn.active { color: var(--accent); }
.nav-icon { font-size: 22px; line-height: 1; }

/* ── Report screen ── */
.tab-row { display: flex; gap: 6px; margin-bottom: 18px; }
.tab { flex: 1; height: 36px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg2); color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.tab.active { background: var(--accent); color: white; border-color: var(--accent); }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
.stat-card { background: var(--bg2); border-radius: var(--radius-sm); padding: 12px 14px; }
.stat-val { font-size: 24px; font-weight: 700; color: var(--text); }
.stat-lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }
.insight { background: var(--accent-light); border: 1px solid rgba(108,99,255,0.2); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 18px; display: flex; gap: 10px; }
.insight-txt { font-size: 13px; color: #3c3489; line-height: 1.5; }
@media (prefers-color-scheme: dark) { .insight { background: rgba(108,99,255,0.12); } .insight-txt { color: #b0abff; } }
.chart-wrap { position: relative; width: 100%; height: 190px; margin-bottom: 18px; }
.divider { border: none; border-top: 1px solid var(--border2); margin: 16px 0; }
.task-row { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 14px; margin-bottom: 8px; }
.task-row-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
.task-row-name { font-size: 14px; font-weight: 500; color: var(--text); }
.bar-bg { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; }
.heat-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 5px; }
.heat-cell { aspect-ratio: 1; border-radius: 3px; }
.heat-day-row { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 14px; }
.heat-day-lbl { font-size: 10px; color: var(--text3); text-align: center; }
.legend-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
.legend-sq { width: 10px; height: 10px; border-radius: 2px; }
</style>
</head>
<body>

<div id="app">

  <!-- ══════ SCREEN: TODAY ══════ -->
  <div class="screen active" id="screen-today">
    <div class="safe-top"></div>
    <div class="header">
      <div class="header-row">
        <div class="header-title">Hôm nay</div>
        <div class="header-date" id="today-date"></div>
      </div>
    </div>
    <div class="scroll">
      <div class="streak-banner">
        <div class="streak-emoji">🔥</div>
        <div class="streak-info">
          <div class="streak-label">Streak tổng thể</div>
          <div class="streak-count" id="overall-streak">0 ngày</div>
          <div class="streak-sub" id="overall-best">Kỷ lục: 0 ngày</div>
        </div>
        <div class="streak-right">
          <div class="s-lbl">Hôm nay</div>
          <div class="s-val" id="today-prog">0/0</div>
        </div>
      </div>

      <div class="prog-row">
        <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="prog-label" id="prog-text">0%</div>
      </div>

      <div class="sec-title">Công việc hôm nay</div>
      <div class="task-list" id="task-list"></div>

      <div class="add-section">
        <div class="sec-title">Thêm mới</div>
        <div class="add-row">
          <input class="add-input" id="add-input" type="text" placeholder="Thói quen mới..." maxlength="60" autocomplete="off">
          <button class="add-btn" onclick="addTask()">+ Thêm</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════ SCREEN: REPORT ══════ -->
  <div class="screen" id="screen-report">
    <div class="safe-top"></div>
    <div class="header">
      <div class="header-row">
        <div class="header-title">Báo cáo</div>
        <div class="header-date" id="report-date"></div>
      </div>
    </div>
    <div class="scroll" id="report-scroll">
      <div class="tab-row">
        <button class="tab active" id="tab-week" onclick="switchReport('week')">📅 Tuần này</button>
        <button class="tab" id="tab-month" onclick="switchReport('month')">📆 Tháng này</button>
      </div>
      <div id="report-content"></div>
    </div>
  </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-today" onclick="goScreen('today')">
    <span class="nav-icon">✅</span>Hôm nay
  </button>
  <button class="nav-btn" id="nav-report" onclick="goScreen('report')">
    <span class="nav-icon">📊</span>Báo cáo
  </button>
</nav>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const KEY = 'todo_app_v2';
let state, chartInstances = {};

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(KEY));
    if (s && s.tasks) return s;
  } catch(e) {}
  return {
    tasks: [
      { id: 't1', name: 'Uống đủ 2L nước', history: [] },
      { id: 't2', name: 'Tập thể dục 20 phút', history: [] },
      { id: 't3', name: 'Đọc sách 15 phút', history: [] },
    ],
    overallStreak: 0, overallBest: 0, lastUpdatedDate: ''
  };
}
function saveState() {
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {}
}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
const dKey = d => d.toISOString().slice(0,10);
const today = () => dKey(new Date());

function getDays(n) {
  const days = [], now = new Date();
  for (let i = n-1; i >= 0; i--) {
    const d = new Date(now); d.setDate(now.getDate()-i); days.push(d);
  }
  return days;
}

function getStreak(task) {
  let s = 0, d = new Date();
  while (true) {
    if (task.history.includes(dKey(d))) { s++; d.setDate(d.getDate()-1); }
    else break;
  }
  return s;
}

function getOverallStreak() {
  if (!state.tasks.length) return 0;
  let s = 0, d = new Date();
  while (true) {
    const k = dKey(d);
    if (state.tasks.every(t => t.history.includes(k))) { s++; d.setDate(d.getDate()-1); }
    else break;
  }
  return s;
}

function compRate(days) {
  if (!state.tasks.length || !days.length) return 0;
  let tot=0, dn=0;
  days.forEach(d => state.tasks.forEach(t => { tot++; if(t.history.includes(dKey(d))) dn++; }));
  return tot ? Math.round(dn/tot*100) : 0;
}
function taskRate(t, days) {
  if (!days.length) return 0;
  return Math.round(days.filter(d => t.history.includes(dKey(d))).length / days.length * 100);
}
function perfDays(days) {
  return days.filter(d => state.tasks.length && state.tasks.every(t => t.history.includes(dKey(d)))).length;
}
function bestStreak(days) {
  let best=0, cur=0;
  days.forEach(d => {
    const ok = state.tasks.length && state.tasks.every(t => t.history.includes(dKey(d)));
    ok ? (cur++, cur>best&&(best=cur)) : (cur=0);
  });
  return best;
}
function barColor(p) { return p>=80?'#2ECC71':p>=50?'#6C63FF':'#FF6B35'; }

function insightText(rate, done) {
  if (rate>=80) return `Xuất sắc! Tỉ lệ ${rate}% — ${done} ngày hoàn hảo. Hãy duy trì phong độ!`;
  if (rate>=60) return `Khá tốt với ${rate}% và ${done} ngày hoàn hảo. Tăng consistency thêm!`;
  if (rate>=40) return `Đạt ${rate}%. Xác định thói quen dễ nhất để tạo đà.`;
  return `Đạt ${rate}%. Chọn 1 nhiệm vụ làm trụ cột và kiên trì mỗi ngày!`;
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
let toastTimer;
function showToast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
let currentReport = 'week';
function goScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if (name === 'report') renderReport(currentReport);
}
function switchReport(tab) {
  currentReport = tab;
  document.getElementById('tab-week').classList.toggle('active', tab==='week');
  document.getElementById('tab-month').classList.toggle('active', tab==='month');
  renderReport(tab);
}

// ═══════════════════════════════════════
// MAIN APP RENDER
// ═══════════════════════════════════════
function renderToday() {
  const dn = ['CN','T2','T3','T4','T5','T6','T7'];
  const now = new Date();
  document.getElementById('today-date').textContent = dn[now.getDay()] + ', ' + now.getDate() + '/' + (now.getMonth()+1);
  document.getElementById('report-date').textContent = dn[now.getDay()] + ', ' + now.getDate() + '/' + (now.getMonth()+1);

  const doneCount = state.tasks.filter(t => t.history.includes(today())).length;
  const total = state.tasks.length;
  const pct = total ? Math.round(doneCount/total*100) : 0;
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-text').textContent = pct+'%';
  document.getElementById('today-prog').textContent = doneCount+'/'+total;

  const oStreak = getOverallStreak();
  state.overallStreak = oStreak;
  if (oStreak > (state.overallBest||0)) state.overallBest = oStreak;
  document.getElementById('overall-streak').textContent = oStreak+' ngày';
  document.getElementById('overall-best').textContent = 'Kỷ lục: '+(state.overallBest||0)+' ngày';

  const list = document.getElementById('task-list');
  if (!state.tasks.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Chưa có việc gì.<br>Thêm nhiệm vụ đầu tiên!</div></div>';
    return;
  }

  list.innerHTML = state.tasks.map(task => {
    const done = task.history.includes(today());
    const s = getStreak(task);
    const isHot = s >= 3;
    const pillClass = done ? 'done-pill' : isHot ? 'hot' : '';
    const pillTxt = s > 0 ? '🔥 '+s+' ngày' : '0 ngày';

    const last7 = [];
    for (let i=6; i>=0; i--) {
      const dd = new Date(); dd.setDate(dd.getDate()-i);
      last7.push(task.history.includes(dKey(dd)));
    }
    const dots = last7.map((f,i) => {
      const cls = f ? (isHot ? 'fire' : 'filled') : '';
      return `<div class="dot ${cls}"></div>`;
    }).join('');

    return `<div class="task-card ${done?'done':''}" onclick="toggleTask('${task.id}')">
      <div class="task-top">
        <div class="task-check"><span class="task-check-icon">✓</span></div>
        <div class="task-name">${escHtml(task.name)}</div>
        <div class="streak-pill ${pillClass}">${pillTxt}</div>
        <div class="task-delete" onclick="event.stopPropagation();deleteTask('${task.id}')">×</div>
      </div>
      <div class="task-bottom">
        <div class="dots">${dots}</div>
        <div class="dots-label">7 ngày</div>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════
// TASK ACTIONS
// ═══════════════════════════════════════
function toggleTask(id) {
  const task = state.tasks.find(t => t.id===id);
  if (!task) return;
  const tk = today();
  const wasDone = task.history.includes(tk);
  const allDoneBefore = state.tasks.every(t => t.history.includes(tk));

  if (wasDone) {
    task.history = task.history.filter(d => d !== tk);
  } else {
    task.history.push(tk);
    const s = getStreak(task);
    if (s >= 3) showToast('🔥 '+s+' ngày liên tiếp — "'+task.name+'"!');
    else showToast('✅ Hoàn thành "'+task.name+'"!');
  }

  state.overallStreak = getOverallStreak();
  if (state.overallStreak > (state.overallBest||0)) state.overallBest = state.overallStreak;
  saveState();
  renderToday();

  if (!wasDone && !allDoneBefore && state.tasks.every(t => t.history.includes(tk))) {
    setTimeout(() => showToast('🎉 Hoàn thành tất cả hôm nay!', 3000), 350);
  }
}

function deleteTask(id) {
  if (!confirm('Xoá nhiệm vụ này?')) return;
  state.tasks = state.tasks.filter(t => t.id !== id);
  saveState();
  renderToday();
  showToast('🗑️ Đã xoá nhiệm vụ');
}

function addTask() {
  const inp = document.getElementById('add-input');
  const name = inp.value.trim();
  if (!name) return;
  state.tasks.push({ id: 't'+Date.now(), name, history: [] });
  inp.value = '';
  saveState();
  renderToday();
  showToast('✨ Đã thêm "'+name+'"!');
}

document.getElementById('add-input').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });

// ═══════════════════════════════════════
// REPORT RENDER
// ═══════════════════════════════════════
function destroyChart(id) {
  if (chartInstances[id]) { try { chartInstances[id].destroy(); } catch(e) {} delete chartInstances[id]; }
}

function renderReport(tab) {
  const days = tab==='week' ? getDays(7) : getDays(30);
  const rate = compRate(days), done = perfDays(days), streak = bestStreak(days);
  const el = document.getElementById('report-content');

  destroyChart('mainChart');

  if (tab === 'week') {
    const dn = ['CN','T2','T3','T4','T5','T6','T7'];
    const labels = days.map(d => dn[d.getDay()]);
    const data = days.map(d => {
      const k=dKey(d);
      return state.tasks.length ? Math.round(state.tasks.filter(t=>t.history.includes(k)).length/state.tasks.length*100) : 0;
    });

    el.innerHTML = statsHTML(rate,done,streak,days.length) +
      insightHTML(rate,done) +
      `<div class="sec-title">Tiến độ từng ngày</div>
       <div class="chart-wrap"><canvas id="mainChart" role="img" aria-label="Biểu đồ hoàn thành 7 ngày">Dữ liệu 7 ngày.</canvas></div>
       <div class="divider"></div>
       <div class="sec-title">Chi tiết nhiệm vụ</div>` +
      taskRowsHTML(days);

    chartInstances['mainChart'] = new Chart(document.getElementById('mainChart'), {
      type:'bar',
      data:{ labels, datasets:[{ data, backgroundColor: data.map(barColor), borderRadius:5, borderSkipped:false }] },
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>c.parsed.y+'%'}}},
        scales:{ y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:11}},grid:{color:'rgba(128,128,128,0.08)'}}, x:{ticks:{font:{size:12}},grid:{display:false}} } }
    });

  } else {
    const wLabels=[], wRates=[];
    for(let w=0;w<4;w++){const s=days.slice(w*7,w*7+7);wLabels.push('T'+(w+1));wRates.push(compRate(s));}
    if(days.length>28){wLabels.push('T5');wRates.push(compRate(days.slice(28)));}

    const last28 = days.slice(-28);
    const heatCells = last28.map(d => {
      const k=dKey(d);
      const ratio = state.tasks.length ? state.tasks.filter(t=>t.history.includes(k)).length/state.tasks.length : 0;
      const bg = ratio>=0.8?'#2ECC71':ratio>=0.5?'#6C63FF':ratio>0?'#FF6B35':'';
      const style = bg ? `background:${bg};opacity:${(0.35+ratio*0.65).toFixed(2)}` : 'background:var(--bg3)';
      return `<div class="heat-cell" style="${style}" title="${dKey(d)}: ${Math.round(ratio*100)}%"></div>`;
    }).join('');
    const dayLbls = ['T2','T3','T4','T5','T6','T7','CN'].map(l=>`<div class="heat-day-lbl">${l}</div>`).join('');

    el.innerHTML = statsHTML(rate,done,streak,days.length) +
      insightHTML(rate,done) +
      `<div class="sec-title">Theo tuần</div>
       <div class="chart-wrap"><canvas id="mainChart" role="img" aria-label="Biểu đồ đường theo tuần">4 tuần.</canvas></div>
       <div class="divider"></div>
       <div class="sec-title">Bản đồ nhiệt — 28 ngày</div>
       <div class="heat-grid">${heatCells}</div>
       <div class="heat-day-row">${dayLbls}</div>
       <div class="legend-row">
         <div class="legend-item"><div class="legend-sq" style="background:#2ECC71"></div>≥ 80%</div>
         <div class="legend-item"><div class="legend-sq" style="background:#6C63FF"></div>50–79%</div>
         <div class="legend-item"><div class="legend-sq" style="background:#FF6B35"></div>&lt; 50%</div>
         <div class="legend-item"><div class="legend-sq" style="background:var(--bg3);border:1px solid var(--border)"></div>Chưa làm</div>
       </div>
       <div class="divider"></div>
       <div class="sec-title">Chi tiết nhiệm vụ</div>` +
      taskRowsHTML(days);

    chartInstances['mainChart'] = new Chart(document.getElementById('mainChart'), {
      type:'line',
      data:{ labels:wLabels, datasets:[{ data:wRates, borderColor:'#6C63FF', backgroundColor:'rgba(108,99,255,0.08)', pointBackgroundColor:wRates.map(barColor), pointRadius:5, fill:true, tension:0.35 }] },
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>c.parsed.y+'%'}}},
        scales:{ y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:11}},grid:{color:'rgba(128,128,128,0.08)'}}, x:{ticks:{font:{size:12}},grid:{display:false}} } }
    });
  }
}

function statsHTML(rate,done,streak,total) {
  return `<div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${rate}%</div><div class="stat-lbl">Tỉ lệ hoàn thành</div></div>
    <div class="stat-card"><div class="stat-val">${done}/${total}</div><div class="stat-lbl">Ngày hoàn hảo</div></div>
    <div class="stat-card"><div class="stat-val">${streak}</div><div class="stat-lbl">Streak dài nhất</div></div>
    <div class="stat-card"><div class="stat-val">${state.tasks.length}</div><div class="stat-lbl">Nhiệm vụ</div></div>
  </div>`;
}
function insightHTML(rate,done) {
  return `<div class="insight"><div style="font-size:18px;flex-shrink:0">💡</div><div class="insight-txt">${insightText(rate,done)}</div></div>`;
}
function taskRowsHTML(days) {
  if (!state.tasks.length) return '<div class="empty"><div class="empty-text">Chưa có nhiệm vụ nào.</div></div>';
  return state.tasks.map(t => {
    const r = taskRate(t, days), c = barColor(r);
    return `<div class="task-row">
      <div class="task-row-top">
        <div class="task-row-name">${escHtml(t.name)}</div>
        <div style="font-size:13px;font-weight:700;color:${c}">${r}%</div>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${r}%;background:${c}"></div></div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════
// SERVICE WORKER (PWA offline)
// ═══════════════════════════════════════
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'daily-todo-v1';
self.addEventListener('install', e => { self.skipWaiting(); });
self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(caches.open(CACHE).then(cache =>
    cache.match(e.request).then(cached => {
      const fresh = fetch(e.request).then(r => { cache.put(e.request, r.clone()); return r; }).catch(()=>null);
      return cached || fresh;
    })
  ));
});`;
  const swBlob = new Blob([swCode], {type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
state = loadState();
renderToday();
</script>
