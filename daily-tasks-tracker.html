<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6C63FF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Todo">
<title>Daily Todo Tracker v2</title>
<script>
const manifest = {
  name:"Daily Todo Tracker",short_name:"Daily Todo",start_url:"./",
  display:"standalone",background_color:"#ffffff",theme_color:"#6C63FF",orientation:"portrait",
  icons:[
    {src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%236C63FF'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E",sizes:"192x192",type:"image/svg+xml"},
    {src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='110' fill='%236C63FF'/%3E%3Ctext x='256' y='340' font-size='270' text-anchor='middle'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml"}
  ]
};
const mb=new Blob([JSON.stringify(manifest)],{type:'application/json'});
const ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(mb);
document.head.appendChild(ml);
</script>
<style>
:root{
  --accent:#6C63FF;--accent-light:#EEF0FF;
  --fire:#FF6B35;--fire-light:#FFF0EB;
  --green:#2ECC71;--green-light:#E8FAF1;
  --red:#E74C3C;--yellow:#F39C12;
  --bg:#ffffff;--bg2:#f5f5f7;--bg3:#e8e8ed;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9b9b9b;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.06);
  --radius:14px;--radius-sm:10px;--radius-xs:7px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.07);
    --shadow:0 2px 12px rgba(0,0,0,0.3);
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Display',BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}
.safe-top{height:calc(var(--safe-top) + 10px);flex-shrink:0;}
.header{padding:4px 18px 10px;flex-shrink:0;}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.header-title{font-size:26px;font-weight:700;letter-spacing:-0.5px;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 14px;padding-bottom:calc(var(--safe-bottom) + 88px);}

/* ── DATE NAVIGATOR ── */
.date-nav{display:flex;align-items:center;gap:8px;background:var(--bg2);border-radius:var(--radius);padding:10px 12px;margin-bottom:14px;}
.date-nav-arrow{width:32px;height:32px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;color:var(--text);box-shadow:var(--shadow);}
.date-nav-arrow:active{opacity:0.6;}
.date-nav-center{flex:1;text-align:center;cursor:pointer;}
.date-nav-day{font-size:17px;font-weight:700;color:var(--text);}
.date-nav-full{font-size:12px;color:var(--text2);margin-top:1px;}
.date-nav-today-btn{font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-light);padding:4px 10px;border-radius:20px;cursor:pointer;white-space:nowrap;}
.date-nav-today-btn:active{opacity:0.7;}

/* ── MINI CALENDAR POPUP ── */
.cal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:flex-end;}
.cal-overlay.open{display:flex;}
.cal-sheet{background:var(--bg);border-radius:20px 20px 0 0;padding:20px 16px calc(var(--safe-bottom) + 20px);width:100%;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-month-nav{display:flex;align-items:center;gap:12px;}
.cal-month-lbl{font-size:16px;font-weight:700;}
.cal-nav-btn{width:30px;height:30px;border-radius:50%;background:var(--bg2);border:none;font-size:15px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;}
.cal-close{font-size:22px;color:var(--text2);cursor:pointer;padding:4px;}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;}
.cal-day-lbl{font-size:11px;color:var(--text3);text-align:center;font-weight:600;padding:4px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-cell{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;position:relative;}
.cal-cell:active{opacity:0.6;}
.cal-cell.other-month{color:var(--text3);}
.cal-cell.today-cell{font-weight:700;color:var(--accent);}
.cal-cell.selected{background:var(--accent);color:white;font-weight:700;}
.cal-cell.has-tasks::after{content:'';position:absolute;bottom:2px;width:4px;height:4px;border-radius:50%;background:var(--green);}
.cal-cell.selected.has-tasks::after{background:white;}
.cal-cell.has-tasks.all-done::after{background:var(--green);}

/* ── STREAK BANNER ── */
.streak-banner{background:var(--fire-light);border:1px solid rgba(255,107,53,0.2);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.streak-emoji{font-size:28px;line-height:1;}
.streak-info{flex:1;}
.streak-label{font-size:10px;color:#b85a2a;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.streak-count{font-size:20px;font-weight:700;color:#7a3a16;}
.streak-sub{font-size:11px;color:#b85a2a;}
.streak-right{text-align:right;}
.s-lbl{font-size:11px;color:#b85a2a;font-weight:500;}
.s-val{font-size:18px;font-weight:700;color:#7a3a16;}

/* ── PROGRESS ── */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.prog-bar{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.4s ease;}
.prog-label{font-size:13px;color:var(--text2);font-weight:600;min-width:36px;text-align:right;}

/* ── SECTION TITLE ── */
.sec-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;}

/* ── TASK CARDS ── */
.task-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.task-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 12px;cursor:pointer;transition:transform 0.1s,border-color 0.2s;user-select:none;}
.task-card:active{transform:scale(0.98);}
.task-card.done{border-color:rgba(46,204,113,0.35);background:var(--green-light);}
@media(prefers-color-scheme:dark){.task-card.done{background:rgba(46,204,113,0.08);}}
.task-top{display:flex;align-items:center;gap:8px;}
.task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;font-size:12px;color:white;}
.task-card.done .task-check{background:var(--green);border-color:var(--green);}
.task-name{flex:1;font-size:14px;font-weight:500;color:var(--text);}
.task-card.done .task-name{color:#27ae60;text-decoration:line-through;}
.streak-pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--bg2);color:var(--text2);white-space:nowrap;}
.streak-pill.hot{background:var(--fire-light);color:#7a3a16;}
.streak-pill.done-pill{background:var(--green-light);color:#1a6b3a;}
.task-delete{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--text3);font-size:17px;transition:color 0.15s;}
.task-delete:active{color:var(--red);}
.task-bottom{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border2);}
.task-card.done .task-bottom{border-top-color:rgba(46,204,113,0.2);}
.dots{display:flex;gap:3px;flex:1;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--bg3);}
.dot.filled{background:var(--green);}
.dot.fire{background:var(--fire);}
.dots-label{font-size:11px;color:var(--text3);}

/* ── ADD SECTION ── */
.add-row{display:flex;gap:8px;}
.add-input{flex:1;height:42px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xs);padding:0 12px;font-size:14px;color:var(--text);outline:none;-webkit-appearance:none;font-family:inherit;}
.add-input:focus{border-color:var(--accent);background:var(--bg);}
.add-btn{height:42px;padding:0 16px;background:var(--accent);color:white;border:none;border-radius:var(--radius-xs);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.add-btn:active{opacity:0.8;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:32px 20px;color:var(--text2);}
.empty-icon{font-size:44px;margin-bottom:10px;}
.empty-text{font-size:14px;line-height:1.5;}

/* ── TOAST ── */
#toast{position:fixed;top:calc(var(--safe-top) + 14px);left:50%;transform:translateX(-50%) translateY(-120px);background:#1a1a1a;color:white;font-size:13px;font-weight:600;padding:10px 18px;border-radius:24px;white-space:nowrap;z-index:999;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;max-width:88vw;text-align:center;}
@media(prefers-color-scheme:dark){#toast{background:#f2f2f7;color:#1c1c1e;}}
#toast.show{transform:translateX(-50%) translateY(0);}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;gap:2px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:10px;font-weight:600;font-family:inherit;transition:color 0.15s;}
.nav-btn.active{color:var(--accent);}
.nav-icon{font-size:21px;line-height:1;}

/* ── REPORT SCREEN ── */
.tab-row{display:flex;gap:6px;margin-bottom:16px;}
.tab{flex:1;height:36px;border:1px solid var(--border);border-radius:var(--radius-xs);background:var(--bg2);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.tab.active{background:var(--accent);color:white;border-color:var(--accent);}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.stat-card{background:var(--bg2);border-radius:var(--radius-xs);padding:11px 12px;}
.stat-val{font-size:22px;font-weight:700;color:var(--text);}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:2px;}
.insight{background:var(--accent-light);border:1px solid rgba(108,99,255,0.2);border-radius:var(--radius-xs);padding:11px 12px;margin-bottom:16px;display:flex;gap:8px;}
.insight-txt{font-size:13px;color:#3c3489;line-height:1.5;}
@media(prefers-color-scheme:dark){.insight{background:rgba(108,99,255,0.12);}.insight-txt{color:#b0abff;}}
.chart-wrap{position:relative;width:100%;height:180px;margin-bottom:16px;}
.divider{border:none;border-top:1px solid var(--border2);margin:14px 0;}
.task-row-r{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-xs);padding:10px 12px;margin-bottom:7px;}
.task-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.task-row-name{font-size:13px;font-weight:600;color:var(--text);}
.bar-bg{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;}
.heat-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;}
.heat-cell{aspect-ratio:1;border-radius:3px;}
.heat-day-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px;}
.heat-day-lbl{font-size:10px;color:var(--text3);text-align:center;}
.legend-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);}
.legend-sq{width:10px;height:10px;border-radius:2px;}
</style>
</head>
<body>
<div id="app">

<!-- ══ SCREEN: TODAY ══ -->
<div class="screen active" id="screen-today">
  <div class="safe-top"></div>
  <div class="header">
    <div class="header-row">
      <div class="header-title" id="screen-title">Hôm nay</div>
    </div>
  </div>
  <div class="scroll">

    <!-- DATE NAVIGATOR -->
    <div class="date-nav">
      <div class="date-nav-arrow" onclick="shiftDay(-1)">‹</div>
      <div class="date-nav-center" onclick="openCal()">
        <div class="date-nav-day" id="nav-day-label"></div>
        <div class="date-nav-full" id="nav-date-full"></div>
      </div>
      <div class="date-nav-today-btn" id="today-btn" onclick="goToday()" style="display:none">Hôm nay</div>
      <div class="date-nav-arrow" onclick="shiftDay(1)" id="next-arrow">›</div>

    <!-- STREAK BANNER -->
    <div class="streak-banner">

    <div class="prog-row">

    <div class="add-section">
      <div class="sec-title" style="margin-bottom:8px">Thêm nhiệm vụ</div>
      <div class="add-row">
        <input class="add-input" id="add-input" type="text" placeholder="Thêm việc cần làm..." maxlength="60" autocomplete="off">
        <button class="add-btn" onclick="addTask()">+ Thêm</button>

</div>

<!-- ══ SCREEN: REPORT ══ -->
<div class="screen" id="screen-report">
  <div class="safe-top"></div>
  <div class="header">
    <div class="header-row">
      <div class="header-title">Báo cáo</div>
    </div>
  </div>
  <div class="scroll">
    <div class="tab-row">
      <button class="tab active" id="tab-week" onclick="switchReport('week')">📅 Tuần này</button>

</div><!-- end #app -->

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-today" onclick="goScreen('today')">
    <span class="nav-icon">✅</span>Nhiệm vụ
  </button>
  <button class="nav-btn" id="nav-report" onclick="goScreen('report')">
    <span class="nav-icon">📊</span>Báo cáo
  </button>

<!-- MINI CALENDAR -->
<div class="cal-overlay" id="cal-overlay" onclick="closeCal(event)">
  <div class="cal-sheet" id="cal-sheet">
    <div class="cal-header">
      <div class="cal-month-nav">
        <button class="cal-nav-btn" onclick="calShiftMonth(-1)">‹</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ════════════════════════════════
// STATE & STORAGE
// ════════════════════════════════
/*
  Data model v2:
  {
    tasks: [{ id, name, history: string[] }],
    // history = mảng dateKey task này đã được TICK DONE
    // task tồn tại xuyên suốt, hiển thị ở mọi ngày
    // "task theo ngày" = task được TẠO RA vào ngày đó (có field createdDate)
    // nếu createdDate tồn tại, task chỉ hiện từ createdDate trở đi
    overallStreak: number,
    overallBest: number
  }
*/
const KEY = 'todo_v2';
let state;
function loadState(){
  try{const s=JSON.parse(localStorage.getItem(KEY));if(s&&s.tasks)return s;}catch(e){}
  return{tasks:[
    {id:'t1',name:'Uống đủ 2L nước',history:[],createdDate:dKey(new Date())},
    {id:'t2',name:'Tập thể dục 20 phút',history:[],createdDate:dKey(new Date())},
    {id:'t3',name:'Đọc sách 15 phút',history:[],createdDate:dKey(new Date())},
  ],overallStreak:0,overallBest:0};
}
function saveState(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}

// ════════════════════════════════
// DATE UTILS
// ════════════════════════════════
const dKey = d => {
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
};
const today = () => dKey(new Date());
const parseDate = k => { const [y,m,d]=k.split('-');return new Date(+y,+m-1,+d); };
function addDays(k,n){const d=parseDate(k);d.setDate(d.getDate()+n);return dKey(d);}
function getDays(n){
  const days=[],now=new Date();
  for(let i=n-1;i>=0;i--){const d=new Date(now);d.setDate(now.getDate()-i);days.push(d);}
  return days;
}
const VN_DAYS=['CN','T2','T3','T4','T5','T6','T7'];
const VN_MONTHS=['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];

// ════════════════════════════════
// VIEWING DATE
// ════════════════════════════════
let viewingDate = today(); // dateKey đang xem

function isToday(k){ return k === today(); }

function shiftDay(n){
  const nd = addDays(viewingDate, n);
  // không cho đi quá hôm nay
  if(nd > today()) return;
  viewingDate = nd;
  renderToday();
}
function goToday(){
  viewingDate = today();
  renderToday();
}

// Tasks visible on a given date = tasks có createdDate <= date
function getTasksForDate(k){
  return state.tasks.filter(t => (t.createdDate||'') <= k);
}

// ════════════════════════════════
// STREAK UTILS
// ════════════════════════════════
function getStreak(task){
  let s=0,d=new Date();
  while(true){
    if(task.history.includes(dKey(d))){s++;d.setDate(d.getDate()-1);}
    else break;
  }
  return s;
}
function getOverallStreak(){
  const allTasks=state.tasks;
  if(!allTasks.length)return 0;
  let s=0,d=new Date();
  while(true){
    const k=dKey(d);
    const visible=getTasksForDate(k);
    if(visible.length && visible.every(t=>t.history.includes(k))){s++;d.setDate(d.getDate()-1);}
    else break;
  }
  return s;
}
function compRate(days){
  let tot=0,dn=0;
  days.forEach(d=>{
    const k=dKey(d);
    const visible=getTasksForDate(k);
    visible.forEach(t=>{tot++;if(t.history.includes(k))dn++;});
  });
  return tot?Math.round(dn/tot*100):0;
}
function taskRate(t,days){
  if(!days.length)return 0;
  const relevant=days.filter(d=>(t.createdDate||'')<=dKey(d));
  if(!relevant.length)return 0;
  return Math.round(relevant.filter(d=>t.history.includes(dKey(d))).length/relevant.length*100);
}
function perfDays(days){
  return days.filter(d=>{
    const k=dKey(d);
    const v=getTasksForDate(k);
    return v.length&&v.every(t=>t.history.includes(k));
  }).length;
}
function bestStreak(days){
  let best=0,cur=0;
  days.forEach(d=>{
    const k=dKey(d);
    const v=getTasksForDate(k);
    const ok=v.length&&v.every(t=>t.history.includes(k));
    ok?(cur++,cur>best&&(best=cur)):(cur=0);
  });
  return best;
}
function barColor(p){return p>=80?'#2ECC71':p>=50?'#6C63FF':'#FF6B35';}
function insightText(rate,done){
  if(rate>=80)return`Xuất sắc! Tỉ lệ ${rate}% — ${done} ngày hoàn hảo. Duy trì phong độ!`;
  if(rate>=60)return`Khá tốt với ${rate}% và ${done} ngày hoàn hảo. Tăng consistency thêm!`;
  if(rate>=40)return`Đạt ${rate}%. Xác định thói quen dễ nhất để tạo đà.`;
  return`Đạt ${rate}%. Chọn 1 nhiệm vụ làm trụ cột và kiên trì mỗi ngày!`;
}

// ════════════════════════════════
// RENDER TODAY SCREEN
// ════════════════════════════════
function renderToday(){
  const k=viewingDate;
  const vd=parseDate(k);
  const isTod=isToday(k);

  // Header title
  document.getElementById('screen-title').textContent = isTod?'Hôm nay':'Nhật ký';

  // Date nav
  document.getElementById('nav-day-label').textContent =
    isTod ? `${VN_DAYS[vd.getDay()]}, ${vd.getDate()} tháng ${vd.getMonth()+1}` :
            `${VN_DAYS[vd.getDay()]}, ${vd.getDate()} tháng ${vd.getMonth()+1}`;
  document.getElementById('nav-date-full').textContent = vd.getFullYear() + (isTod?' — Hôm nay':'');
  document.getElementById('today-btn').style.display = isTod?'none':'flex';
  document.getElementById('next-arrow').style.opacity = (addDays(k,1)>today())?'0.25':'1';
  document.getElementById('viewing-lbl').textContent = isTod?'Hôm nay':VN_DAYS[vd.getDay()];

  // Streak banner
  const oStreak=getOverallStreak();
  state.overallStreak=oStreak;
  if(oStreak>(state.overallBest||0))state.overallBest=oStreak;
  document.getElementById('overall-streak').textContent=oStreak+' ngày';
  document.getElementById('overall-best').textContent='Kỷ lục: '+(state.overallBest||0)+' ngày';

  const tasks=getTasksForDate(k);
  const doneCount=tasks.filter(t=>t.history.includes(k)).length;
  const total=tasks.length;
  const pct=total?Math.round(doneCount/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=pct+'%';
  document.getElementById('today-prog').textContent=doneCount+'/'+total;

  // Task list
  const list=document.getElementById('task-list');
  if(!tasks.length){
    list.innerHTML=`<div class="empty">
      <div class="empty-icon">${isTod?'📋':'🗓️'}</div>
      <div class="empty-text">${isTod?'Chưa có nhiệm vụ nào.<br>Thêm việc đầu tiên!':'Không có nhiệm vụ nào<br>được tạo vào ngày này.'}</div>
    </div>`;
    return;
  }

  list.innerHTML=tasks.map(task=>{
    const done=task.history.includes(k);
    const s=getStreak(task);
    const isHot=s>=3;
    const pillClass=done?'done-pill':isHot?'hot':'';
    const pillTxt=s>0?'🔥 '+s+' ngày':'0 ngày';

    const last7=[];
    for(let i=6;i>=0;i--){
      const dd=new Date(vd);dd.setDate(vd.getDate()-i);
      const dk2=dKey(dd);
      if((task.createdDate||'')<=dk2) last7.push(task.history.includes(dk2)?'done':'empty');
      else last7.push('na');
    }
    const dots=last7.map(f=>{
      if(f==='na')return`<div class="dot" style="opacity:0.2"></div>`;
      if(f==='done')return`<div class="dot ${isHot?'fire':'filled'}"></div>`;
      return`<div class="dot"></div>`;
    }).join('');

    return`<div class="task-card ${done?'done':''}" onclick="toggleTask('${task.id}')">
      <div class="task-top">
        <div class="task-check">${done?'✓':''}</div>
        <div class="task-name">${escHtml(task.name)}</div>
        <div class="streak-pill ${pillClass}">${pillTxt}</div>
        <div class="task-delete" onclick="event.stopPropagation();deleteTask('${task.id}')">×</div>
      </div>
      <div class="task-bottom">
        <div class="dots">${dots}</div>
        <div class="dots-label">7 ngày</div>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════
// TASK ACTIONS
// ════════════════════════════════
function toggleTask(id){
  const task=state.tasks.find(t=>t.id===id);
  if(!task)return;
  const k=viewingDate;
  const wasDone=task.history.includes(k);
  const tasks=getTasksForDate(k);
  const allDoneBefore=tasks.every(t=>t.history.includes(k));

  if(wasDone){
    task.history=task.history.filter(d=>d!==k);
  } else {
    task.history.push(k);
    // streak chỉ count từ hôm nay về quá khứ liên tiếp
    const s=getStreak(task);
    if(s>=3)showToast('🔥 '+s+' ngày liên tiếp — "'+task.name+'"!');
    else showToast('✅ Hoàn thành "'+task.name+'"!');
  }

  state.overallStreak=getOverallStreak();
  if(state.overallStreak>(state.overallBest||0))state.overallBest=state.overallStreak;
  saveState();renderToday();

  if(!wasDone&&!allDoneBefore&&getTasksForDate(k).every(t=>t.history.includes(k))){
    setTimeout(()=>showToast('🎉 Hoàn thành tất cả nhiệm vụ ngày này!',3000),350);
  }
}

function deleteTask(id){
  if(!confirm('Xoá nhiệm vụ này?\n(Lịch sử streak sẽ bị xoá)'))return;
  state.tasks=state.tasks.filter(t=>t.id!==id);
  saveState();renderToday();
  showToast('🗑️ Đã xoá nhiệm vụ');
}

function addTask(){
  const inp=document.getElementById('add-input');
  const name=inp.value.trim();
  if(!name)return;
  // Task được tạo từ ngày đang xem
  state.tasks.push({id:'t'+Date.now(),name,history:[],createdDate:viewingDate});
  inp.value='';
  saveState();renderToday();
  showToast('✨ Đã thêm "'+name+'"!');
}

document.getElementById('add-input').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});

// ════════════════════════════════
// MINI CALENDAR
// ════════════════════════════════
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();

function openCal(){
  const vd=parseDate(viewingDate);
  calYear=vd.getFullYear();calMonth=vd.getMonth();
  renderCal();
  document.getElementById('cal-overlay').classList.add('open');
}
function closeCal(e){
  if(!e||e.target===document.getElementById('cal-overlay'))
    document.getElementById('cal-overlay').classList.remove('open');
}
function calShiftMonth(n){
  calMonth+=n;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  renderCal();
}
function renderCal(){
  document.getElementById('cal-month-lbl').textContent=VN_MONTHS[calMonth]+' '+calYear;
  const grid=document.getElementById('cal-grid');
  const todayK=today();
  const firstDay=new Date(calYear,calMonth,1);
  // Monday=0 offset
  let startDow=firstDay.getDay()-1; if(startDow<0)startDow=6;
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  let cells='';
  // prev month fill
  for(let i=startDow-1;i>=0;i--){
    const d=daysInPrev-i;
    const k=dKey(new Date(calYear,calMonth-1,d));
    cells+=calCell(k,d,true);
  }
  for(let d=1;d<=daysInMonth;d++){
    const k=dKey(new Date(calYear,calMonth,d));
    cells+=calCell(k,d,false);
  }
  // next month fill
  const total=startDow+daysInMonth;
  const remaining=(7-total%7)%7;
  for(let d=1;d<=remaining;d++){
    const k=dKey(new Date(calYear,calMonth+1,d));
    cells+=calCell(k,d,true);
  }
  grid.innerHTML=cells;
}
function calCell(k,d,otherMonth){
  const todayK=today();
  const isSel=k===viewingDate;
  const isTod=k===todayK;
  const tasks=getTasksForDate(k);
  const hasTasks=tasks.length>0;
  const allDone=hasTasks&&tasks.every(t=>t.history.includes(k));
  const future=k>todayK;
  let cls='cal-cell';
  if(otherMonth)cls+=' other-month';
  if(isTod&&!isSel)cls+=' today-cell';
  if(isSel)cls+=' selected';
  if(hasTasks)cls+=' has-tasks';
  if(allDone)cls+=' all-done';
  const onclick=future?'':`onclick="selectCalDate('${k}')"`;
  const opacity=future?' style="opacity:0.3"':'';
  return`<div class="${cls}"${opacity}${future?'':` onclick="selectCalDate('${k}')"`}>${d}</div>`;
}
function selectCalDate(k){
  viewingDate=k;
  document.getElementById('cal-overlay').classList.remove('open');
  renderToday();
}

// ════════════════════════════════
// REPORT
// ════════════════════════════════
let chartInst={};
function destroyChart(id){if(chartInst[id]){try{chartInst[id].destroy();}catch(e){}delete chartInst[id];}}

function renderReport(tab){
  const days=tab==='week'?getDays(7):getDays(30);
  const rate=compRate(days),done=perfDays(days),streak=bestStreak(days);
  destroyChart('mainChart');
  const el=document.getElementById('report-content');

  if(tab==='week'){
    const labels=days.map(d=>VN_DAYS[d.getDay()]);
    const data=days.map(d=>{
      const k=dKey(d);
      const v=getTasksForDate(k);
      return v.length?Math.round(v.filter(t=>t.history.includes(k)).length/v.length*100):0;
    });
    el.innerHTML=statsHTML(rate,done,streak,days.length)+insightHTML(rate,done)+
      `<div class="sec-title">Tiến độ từng ngày</div>
       <div class="chart-wrap"><canvas id="mainChart" role="img" aria-label="Biểu đồ 7 ngày">7 ngày qua.</canvas></div>
       <div class="divider"></div>
       <div class="sec-title">Chi tiết nhiệm vụ</div>`+
      taskRowsHTML(days);
    chartInst['mainChart']=new Chart(document.getElementById('mainChart'),{
      type:'bar',
      data:{labels,datasets:[{data,backgroundColor:data.map(barColor),borderRadius:5,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y+'%'}}},
        scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:11}},grid:{color:'rgba(128,128,128,0.08)'}},
                x:{ticks:{font:{size:12}},grid:{display:false}}}}
    });
  } else {
    const wL=[],wR=[];
    for(let w=0;w<4;w++){const s=days.slice(w*7,w*7+7);wL.push('T'+(w+1));wR.push(compRate(s));}
    if(days.length>28){wL.push('T5');wR.push(compRate(days.slice(28)));}

    const last28=days.slice(-28);
    const heatCells=last28.map(d=>{
      const k=dKey(d);
      const v=getTasksForDate(k);
      const ratio=v.length?v.filter(t=>t.history.includes(k)).length/v.length:0;
      const bg=ratio>=0.8?'#2ECC71':ratio>=0.5?'#6C63FF':ratio>0?'#FF6B35':'';
      const style=bg?`background:${bg};opacity:${(0.35+ratio*0.65).toFixed(2)}`:'background:var(--bg3)';
      return`<div class="heat-cell" style="${style}" title="${k}: ${Math.round(ratio*100)}%"></div>`;
    }).join('');
    const dayLbls=['T2','T3','T4','T5','T6','T7','CN'].map(l=>`<div class="heat-day-lbl">${l}</div>`).join('');

    el.innerHTML=statsHTML(rate,done,streak,days.length)+insightHTML(rate,done)+
      `<div class="sec-title">Theo tuần</div>
       <div class="chart-wrap"><canvas id="mainChart" role="img" aria-label="Biểu đồ đường theo tuần">4 tuần.</canvas></div>
       <div class="divider"></div>
       <div class="sec-title">Bản đồ nhiệt — 28 ngày</div>
       <div class="heat-grid">${heatCells}</div>
       <div class="heat-day-row">${dayLbls}</div>
       <div class="legend-row">
         <div class="legend-item"><div class="legend-sq" style="background:#2ECC71"></div>≥ 80%</div>
         <div class="legend-item"><div class="legend-sq" style="background:#6C63FF"></div>50–79%</div>
         <div class="legend-item"><div class="legend-sq" style="background:#FF6B35"></div>&lt; 50%</div>
         <div class="legend-item"><div class="legend-sq" style="background:var(--bg3);border:1px solid var(--border)"></div>Chưa làm</div>
       </div>
       <div class="divider"></div>
       <div class="sec-title">Chi tiết nhiệm vụ</div>`+
      taskRowsHTML(days);
    chartInst['mainChart']=new Chart(document.getElementById('mainChart'),{
      type:'line',
      data:{labels:wL,datasets:[{data:wR,borderColor:'#6C63FF',backgroundColor:'rgba(108,99,255,0.08)',
        pointBackgroundColor:wR.map(barColor),pointRadius:5,fill:true,tension:0.35}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y+'%'}}},
        scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:11}},grid:{color:'rgba(128,128,128,0.08)'}},
                x:{ticks:{font:{size:12}},grid:{display:false}}}}
    });
  }
}

function statsHTML(rate,done,streak,total){
  return`<div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${rate}%</div><div class="stat-lbl">Tỉ lệ hoàn thành</div></div>
    <div class="stat-card"><div class="stat-val">${done}/${total}</div><div class="stat-lbl">Ngày hoàn hảo</div></div>
    <div class="stat-card"><div class="stat-val">${streak}</div><div class="stat-lbl">Streak dài nhất</div></div>
    <div class="stat-card"><div class="stat-val">${state.tasks.length}</div><div class="stat-lbl">Nhiệm vụ</div></div>
  </div>`;
}
function insightHTML(rate,done){
  return`<div class="insight"><div style="font-size:18px;flex-shrink:0">💡</div><div class="insight-txt">${insightText(rate,done)}</div></div>`;
}
function taskRowsHTML(days){
  if(!state.tasks.length)return'<div class="empty"><div class="empty-text">Chưa có nhiệm vụ.</div></div>';
  return state.tasks.map(t=>{
    const r=taskRate(t,days),c=barColor(r);
    return`<div class="task-row-r">
      <div class="task-row-top">
        <div class="task-row-name">${escHtml(t.name)}</div>
        <div style="font-size:13px;font-weight:700;color:${c}">${r}%</div>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${r}%;background:${c}"></div></div>
    </div>`;
  }).join('');
}
